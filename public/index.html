<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flora AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-deep:#0a0a0b; --bg-elevated:#111113; --bg-panel:#161618; --bg-card:#1a1a1c;
            --accent:#c9a87c; --accent-soft:rgba(201,168,124,.15); --accent-glow:rgba(201,168,124,.4);
            --text-primary:#f4f4f5; --text-secondary:#a1a1aa; --text-muted:#71717a;
            --border-subtle:rgba(255,255,255,.06); --border-accent:rgba(201,168,124,.2);
            --shadow-sm:0 2px 8px rgba(0,0,0,.3); --shadow-md:0 8px 24px rgba(0,0,0,.4); --shadow-lg:0 16px 48px rgba(0,0,0,.5);
            --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:24px;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        html,body{height:100%;overflow:hidden;}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-deep);color:var(--text-primary);line-height:1.6;letter-spacing:-.01em;}

        /* AMBIENT */
        .ambient-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
        .ambient-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:orbFloat 20s ease-in-out infinite;}
        .orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,124,.15) 0%,transparent 70%);top:-200px;right:-100px;}
        .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(139,92,246,.1) 0%,transparent 70%);bottom:-100px;left:-100px;animation-delay:-10s;}
        .orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,124,.1) 0%,transparent 70%);top:50%;left:30%;animation-delay:-5s;}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(30px,-20px) scale(1.05);}50%{transform:translate(-20px,30px) scale(.95);}75%{transform:translate(-30px,-10px) scale(1.02);}}
        .noise-overlay{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");}
        #particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:2;}

        /* AUTH */
        #auth-layer{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg-deep);}
        .auth-container{width:100%;max-width:380px;padding:48px 40px;position:relative;z-index:2;}
        .auth-brand{text-align:center;margin-bottom:48px;}
        .auth-logo{width:64px;height:64px;margin:0 auto 20px;background:linear-gradient(135deg,var(--accent),#d4b896);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--bg-deep);box-shadow:0 8px 32px var(--accent-glow);animation:logoPulse 3s ease-in-out infinite;}
        @keyframes logoPulse{0%,100%{transform:scale(1);box-shadow:0 8px 32px var(--accent-glow);}50%{transform:scale(1.02);box-shadow:0 12px 40px var(--accent-glow);}}
        .auth-title{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px;}
        .auth-subtitle{font-size:14px;color:var(--text-muted);letter-spacing:.02em;}
        .auth-form{display:flex;flex-direction:column;gap:16px;}
        .input-group label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
        .auth-input{width:100%;padding:16px 20px;background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-primary);font-size:15px;font-family:inherit;transition:all .3s;}
        .auth-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
        .auth-input::placeholder{color:var(--text-muted);}
        .auth-btn{width:100%;padding:16px 24px;margin-top:8px;background:linear-gradient(135deg,var(--accent),#d4b896);border:none;border-radius:var(--radius-md);color:var(--bg-deep);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .3s;}
        .auth-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--accent-glow);}

        /* APP */
        #app-interface{display:flex;width:100%;height:100%;opacity:0;transition:opacity .5s ease;position:relative;z-index:2;}

        /* SIDEBAR */
        .sidebar{width:300px;background:var(--bg-elevated);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:100;}
        .sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border-subtle);}
        .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
        .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#d4b896);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--bg-deep);font-size:16px;}
        .brand-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;letter-spacing:-.02em;}
        .new-chat-btn{width:100%;padding:14px 20px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-primary);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;}
        .new-chat-btn:hover{background:var(--accent-soft);border-color:var(--border-accent);color:var(--accent);}
        .history-section{flex:1;overflow-y:auto;padding:16px 12px;}
        .history-section::-webkit-scrollbar{width:4px;}
        .history-section::-webkit-scrollbar-thumb{background:var(--border-subtle);border-radius:4px;}
        .history-date{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 12px;position:sticky;top:0;background:var(--bg-elevated);}
        .history-item{padding:12px 14px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:4px;transition:all .2s;border:1px solid transparent;}
        .history-item:hover{background:var(--bg-card);}
        .history-item.active{background:var(--accent-soft);border-color:var(--border-accent);}
        .history-item.active .history-title{color:var(--accent);}
        .history-title{font-size:14px;font-weight:500;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

        /* MAIN */
        .main-view{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;z-index:1;}
        .mobile-header{display:none;padding:16px 20px;align-items:center;justify-content:space-between;background:rgba(10,10,11,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-subtle);position:relative;z-index:50;}
        .mobile-brand-name{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;}
        .menu-btn{background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;padding:8px;transition:color .2s;}
        .menu-btn:hover{color:var(--text-primary);}

        /* CHAT STREAM */
        #chat-stream{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:24px 0;scroll-behavior:smooth;position:relative;}
        #chat-stream::-webkit-scrollbar{width:6px;}
        #chat-stream::-webkit-scrollbar-thumb{background:var(--border-subtle);border-radius:3px;}
        .msg-wrapper{max-width:800px;width:100%;margin:0 auto;padding:0 24px;}
        .msg-group{display:flex;gap:16px;margin-bottom:32px;animation:msgSlide .4s cubic-bezier(.16,1,.3,1);position:relative;}
        @keyframes msgSlide{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
        .msg-group.user{justify-content:flex-end;}

        /* AVATAR */
        .avatar{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--accent-soft);border:1px solid var(--border-accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:14px;transition:box-shadow .4s;}
        .avatar.thinking-glow{animation:avatarGlow 1.5s ease-in-out infinite;}
        @keyframes avatarGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,124,0);}50%{box-shadow:0 0 0 6px rgba(201,168,124,.25),0 0 20px rgba(201,168,124,.15);}}

        /* BUBBLE */
        .user .bubble{background:var(--bg-card);border:1px solid var(--border-subtle);padding:14px 18px;border-radius:var(--radius-lg);border-top-right-radius:var(--radius-sm);max-width:75%;font-size:15px;line-height:1.6;}
        .bot-content{flex:1;min-width:0;}
        .bot-content p{margin-bottom:12px;}
        .bot-content p:last-child{margin-bottom:0;}
        .bot-content strong{color:var(--accent);font-weight:600;}
        .bot-content code:not([class*="language-"]){background:var(--bg-card);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono','Fira Code',monospace;}

        /* TYPEWRITER CURSOR */
        .tw-cursor{display:inline-block;width:2px;height:1.1em;background:var(--accent);margin-left:2px;vertical-align:text-bottom;border-radius:1px;animation:twBlink .65s ease-in-out infinite;}
        @keyframes twBlink{0%,100%{opacity:1;}50%{opacity:0;}}

        /* MESSAGE ACTIONS */
        .msg-actions{position:absolute;bottom:-18px;left:52px;display:flex;gap:4px;opacity:0;transform:translateY(4px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:10;}
        .msg-group:hover .msg-actions{opacity:1;transform:translateY(0);pointer-events:auto;}
        .msg-group.user .msg-actions{left:auto;right:0;}
        .msg-action-btn{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;backdrop-filter:blur(8px);}
        .msg-action-btn:hover{background:var(--bg-panel);color:var(--text-primary);border-color:var(--border-accent);}
        .msg-action-btn.liked{background:var(--accent-soft);border-color:var(--border-accent);color:var(--accent);}
        .msg-action-btn.disliked{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#ef4444;}
        .msg-action-btn.copied{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:#22c55e;}

        /* THINKING BLOCK */
        .thinking-block{margin-bottom:12px;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
        .thinking-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg-card);cursor:pointer;user-select:none;transition:background .2s;}
        .thinking-header:hover{background:var(--bg-panel);}
        .thinking-dots{display:flex;gap:3px;}
        .thinking-dots span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:thinkBounce 1.2s ease-in-out infinite;opacity:.8;}
        .thinking-dots span:nth-child(2){animation-delay:.2s;} .thinking-dots span:nth-child(3){animation-delay:.4s;}
        @keyframes thinkBounce{0%,60%,100%{transform:translateY(0);opacity:.8;}30%{transform:translateY(-3px);opacity:1;}}
        .thinking-label{font-size:13px;color:var(--text-secondary);font-style:italic;}
        .thinking-label .think-status{color:var(--accent);font-style:normal;font-weight:500;}
        .thinking-timer{margin-left:auto;font-size:11px;font-family:'SF Mono',monospace;color:var(--text-muted);background:var(--bg-panel);padding:2px 8px;border-radius:10px;border:1px solid var(--border-subtle);}
        .thinking-toggle-icon{font-size:10px;color:var(--text-muted);transition:transform .2s;}
        .thinking-block.collapsed .thinking-toggle-icon{transform:rotate(-90deg);}
        .thinking-summary{font-size:12px;color:var(--text-muted);padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s;background:var(--bg-panel);}
        .thinking-block:not(.collapsed) .thinking-summary{max-height:200px;padding:10px 16px;overflow-y:auto;}

        /* CODE BLOCKS */
        .code-block-wrapper{background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:var(--radius-md);margin:16px 0;overflow:hidden;box-shadow:var(--shadow-md);transition:border-color .2s;}
        .code-block-wrapper:hover{border-color:var(--border-accent);}
        .code-tab-bar{display:flex;align-items:center;background:var(--bg-card);border-bottom:1px solid var(--border-subtle);padding:0 12px;}
        .code-lang-badge{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;padding:10px 12px 10px 4px;border-right:1px solid var(--border-subtle);margin-right:8px;flex-shrink:0;}
        .tab-switcher{display:flex;gap:2px;flex:1;}
        .tab-btn{padding:8px 14px;background:transparent;border:none;border-radius:6px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;position:relative;}
        .tab-btn:hover{color:var(--text-secondary);background:var(--bg-panel);}
        .tab-btn.active{color:var(--text-primary);background:var(--bg-panel);}
        .tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:8px;right:8px;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
        .tab-btn .tab-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;}
        .tab-btn.active .tab-dot{opacity:1;background:var(--accent);}
        .code-actions-right{display:flex;gap:6px;margin-left:auto;flex-shrink:0;}
        .code-btn{background:transparent;border:1px solid var(--border-subtle);border-radius:6px;padding:5px 10px;font-size:11px;font-family:'Inter',sans-serif;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;}
        .code-btn:hover{background:var(--bg-panel);border-color:var(--border-accent);color:var(--accent);}
        .code-btn.success{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#22c55e;}
        .code-pane{display:block;}
        .code-pane pre{margin:0;padding:18px;background:transparent!important;overflow-x:auto;max-height:420px;}
        .code-pane pre code{font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;line-height:1.75;}
        .preview-pane{display:none;position:relative;background:#fff;min-height:320px;}
        .preview-pane.active{display:block;}
        .code-pane.hidden{display:none;}
        .preview-pane iframe{width:100%;min-height:320px;border:none;display:block;}
        .preview-pane .preview-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-panel);gap:12px;color:var(--text-muted);font-size:13px;}
        .preview-spinner{width:28px;height:28px;border:2px solid var(--border-subtle);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .preview-status-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg-card);border-top:1px solid var(--border-subtle);font-size:11px;color:var(--text-muted);}
        .status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.5);animation:pulseDot 2s ease-in-out infinite;}
        @keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.4;}}
        .status-refresh-btn{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:3px 8px;border-radius:4px;display:flex;align-items:center;gap:5px;transition:all .2s;}
        .status-refresh-btn:hover{background:var(--bg-panel);color:var(--accent);}

        /* MODAL */
        .preview-modal{position:fixed;inset:0;z-index:1000;display:none;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);}
        .preview-modal.show{display:flex;flex-direction:column;}
        .preview-modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg-elevated);border-bottom:1px solid var(--border-subtle);flex-shrink:0;}
        .preview-modal-title{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;}
        .preview-modal-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:4px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--border-accent);}
        .preview-modal-actions{display:flex;gap:8px;}
        .preview-modal-btn{padding:7px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:6px;font-size:12px;font-family:'Inter',sans-serif;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
        .preview-modal-btn:hover{background:var(--accent-soft);border-color:var(--border-accent);color:var(--accent);}
        .preview-modal-btn.close-btn:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#ef4444;}
        .preview-modal-body{flex:1;display:flex;overflow:hidden;}
        .modal-split-view{display:flex;flex:1;overflow:hidden;}
        .modal-code-panel{width:45%;border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;background:var(--bg-panel);overflow:hidden;transition:width .3s;}
        .modal-code-panel.collapsed{width:0;border:none;overflow:hidden;}
        .modal-preview-panel{flex:1;background:#fff;display:flex;flex-direction:column;overflow:hidden;}
        .modal-code-scroll{flex:1;overflow:auto;padding:16px;}
        .modal-code-scroll pre{margin:0;background:transparent!important;}
        .modal-code-scroll pre code{font-family:'SF Mono','Fira Code',monospace;font-size:12.5px;line-height:1.75;}
        .modal-iframe{flex:1;border:none;width:100%;height:100%;}
        .modal-divider{width:4px;background:var(--border-subtle);cursor:col-resize;flex-shrink:0;transition:background .2s;}
        .modal-divider:hover,.modal-divider.dragging{background:var(--accent);}

        /* IMAGE GRID */
        .img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0;}
        .img-grid a{display:block;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);transition:all .3s;}
        .img-grid a:hover{border-color:var(--accent);transform:translateY(-2px);}
        .img-grid img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
        .single-img{margin:16px 0;}
        .single-img img{max-width:320px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);}

        /* TYPING */
        .typing-indicator{display:flex;gap:4px;padding:4px 0;}
        .typing-indicator span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:typingBounce 1.4s ease-in-out infinite;}
        .typing-indicator span:nth-child(2){animation-delay:.2s;} .typing-indicator span:nth-child(3){animation-delay:.4s;}
        @keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

        /* WELCOME */
        .welcome-screen{text-align:center;padding:60px 24px;animation:fadeIn .5s ease;}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        .welcome-icon{width:80px;height:80px;margin:0 auto 24px;background:linear-gradient(135deg,var(--accent),#d4b896);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--bg-deep);box-shadow:0 12px 40px var(--accent-glow);}
        .welcome-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:8px;}
        .welcome-title .accent{color:var(--accent);}
        .welcome-subtitle{color:var(--text-muted);font-size:15px;margin-bottom:40px;}
        .starter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:480px;margin:0 auto;}
        .starter-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px;text-align:left;cursor:pointer;transition:all .25s;}
        .starter-card:hover{background:var(--bg-panel);border-color:var(--border-accent);transform:translateY(-3px);}
        .starter-icon{font-size:20px;margin-bottom:10px;color:var(--accent);}
        .starter-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin-bottom:4px;}
        .starter-desc{font-size:12px;color:var(--text-muted);}

        /* INPUT DOCK */
        .input-dock{padding:16px 24px 20px;position:relative;z-index:50;transition:all .3s;}
        .input-dock.centered{position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);width:100%;max-width:640px;padding:0 24px;}
        .input-container{max-width:640px;margin:0 auto;}
        .preview-bar{display:none;align-items:center;gap:12px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);margin-bottom:12px;}
        .preview-bar.show{display:flex;}
        .preview-img{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border-subtle);}
        .preview-actions{flex:1;display:flex;gap:8px;}

// ═══════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════
(function(){
    const canvas=document.getElementById('particle-canvas');
    const ctx=canvas.getContext('2d');
    let W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;
    window.addEventListener('resize',()=>{ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; });
    const particles=[];
    document.addEventListener('mousemove', e=>{ if(Math.random()>.4) spawnAt(e.clientX, e.clientY, 1); });
    function spawnAt(x,y,n){
        for(let i=0;i<n;i++){
            const a=Math.random()*Math.PI*2, s=Math.random()*1.5+.3;
            particles.push({
                x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-.4,
                size:Math.random()*2.5+.5,
                alpha:.7+Math.random()*.3,
                decay:.02+Math.random()*.025,
                hue:30+Math.random()*20,
                sparkle:Math.random()>.55
            });
        }
    }
    window._spawnAt=spawnAt;
    (function frame(){
        ctx.clearRect(0,0,W,H);
        for(let i=particles.length-1;i>=0;i--){
            const p=particles[i];
            p.x+=p.vx; p.y+=p.vy; p.vy+=.025; p.alpha-=p.decay;
            if(p.alpha<=0){particles.splice(i,1);continue;}
            ctx.save(); ctx.globalAlpha=p.alpha;
            const col=`hsla(${p.hue},70%,65%,${p.alpha})`;
            if(p.sparkle){
                ctx.strokeStyle=col; ctx.lineWidth=p.size*.4;
                ctx.beginPath(); ctx.moveTo(p.x-p.size,p.y); ctx.lineTo(p.x+p.size,p.y);
                ctx.moveTo(p.x,p.y-p.size); ctx.lineTo(p.x,p.y+p.size); ctx.stroke();
            } else {
                ctx.fillStyle=col; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
        requestAnimationFrame(frame);
    })();
})();

};

let _newMsgCount=0, _isAtBottom=true;

const scrollBtn=document.getElementById('scroll-to-bottom');

chatStream.addEventListener('scroll',()=>{
    const atBottom = chatStream.scrollHeight - chatStream.scrollTop - chatStream.clientHeight < 100;

});

window.scrollToBottom=function(smooth=true){
    chatStream.scrollTo({top:chatStream.scrollHeight, behavior:smooth?'smooth':'instant'});

};

function bumpNewMsg(){
    if(_isAtBottom) return;

}

const SUGG=[

    'Jelaskan cara kerja neural network dengan analogi',
    'Buatkan game Tetris pakai HTML CSS JS satu file',

];
let _sIdx=0, _sTimer=null, _curSugg='';

function nextSugg(){
    _sIdx=(_sIdx+1)%SUGG.length;
    const el=document.getElementById('input-suggestion');
    const tx=document.getElementById('suggestion-text');
    if(!el||!tx) return;
    el.style.opacity='0';
    setTimeout(()=>{ _curSugg=SUGG[_sIdx]; tx.textContent=_curSugg; el.style.transition='opacity .4s'; el.style.opacity='1'; },200);
}

function startSugg(){
    _curSugg=SUGG[0];
    const tx=document.getElementById('suggestion-text');
    if(tx) tx.textContent=_curSugg;
    if(_sTimer) clearInterval(_sTimer);
    _sTimer=setInterval(nextSugg,4000);
}

window.useSuggestion=function(){
    const ta=document.getElementById('user-input');
    if(!ta||!_curSugg) return;
    ta.value=_curSugg; handleInputChange(ta); ta.focus();
};

window.handleInputChange=function(el){
    el.style.height='auto'; el.style.height=el.scrollHeight+'px';
    const n=el.value.length, MAX=4000;
    const ctr=document.getElementById('char-counter');
    const sug=document.getElementById('input-suggestion');
    if(ctr){
        if(n===0){ ctr.textContent=''; if(sug) sug.style.display='flex'; }
        else{
            ctr.textContent=`${n.toLocaleString()} / ${MAX.toLocaleString()}`;
            ctr.className='char-counter'+(n>MAX*.9?' danger':n>MAX*.75?' warn':'');
            if(sug) sug.style.display='none';
        }
    }
    if(n>0&&_sTimer){ clearInterval(_sTimer); _sTimer=null; }
    else if(n===0&&!_sTimer) startSugg();
};

const _thinkTimers=new Map();

window.createThinkingBlock=function(msgId){
    const thinkId='think-'+msgId;
    const block=document.createElement('div');
    block.className='thinking-block'; block.id=thinkId;
    block.innerHTML=`
        <div class="thinking-header" onclick="toggleThinkBlock('${thinkId}')">
            <div class="thinking-dots"><span></span><span></span><span></span></div>
            <span class="thinking-label"><span class="think-status">Sedang berpikir</span>...</span>
            <span class="thinking-timer" id="timer-${thinkId}">0.0 dtk</span>
            <i class="fa-solid fa-chevron-down thinking-toggle-icon"></i>
        </div>
        <div class="thinking-summary" id="summary-${thinkId}"></div>`;
    const t0=Date.now();
    const iv=setInterval(()=>{ const el=document.getElementById('timer-'+thinkId); if(el) el.textContent=((Date.now()-t0)/1000).toFixed(1)+' dtk'; },100);
    _thinkTimers.set(thinkId,{iv,t0});
    return {thinkId, block};
};

window.finishThinkingBlock=function(thinkId){
    const d=_thinkTimers.get(thinkId); if(!d) return;
    clearInterval(d.iv);
    const elapsed=((Date.now()-d.t0)/1000).toFixed(1);
    _thinkTimers.delete(thinkId);
    const block=document.getElementById(thinkId); if(!block) return;
    const s=block.querySelector('.think-status'); if(s) s.textContent='Selesai berpikir';
    const dots=block.querySelector('.thinking-dots'); if(dots) dots.innerHTML='<i class="fa-solid fa-check" style="color:var(--accent);font-size:12px;"></i>';
    const timer=document.getElementById('timer-'+thinkId); if(timer) timer.textContent=elapsed+' dtk';
    block.classList.add('collapsed');
};

        };

        const regenBtn=document.createElement('button');
        regenBtn.className='msg-action-btn'; regenBtn.innerHTML='<i class="fa-solid fa-rotate-right"></i> Ulang';
        regenBtn.onclick=()=>{
            showToast('Generating ulang...','info',1500);

            while(prev&&!prev.classList.contains('user')) prev=prev.previousElementSibling;

            if(userTxt) sendMessage(userTxt, msgId);

        bar.append(likeBtn, dislikeBtn, copyBtn, regenBtn);
    } else {
        const copyBtn=document.createElement('button');
        copyBtn.className='msg-action-btn'; copyBtn.innerHTML='<i class="fa-regular fa-copy"></i> Salin';

const usernameInput=document.getElementById('username');
const loginBtn=document.getElementById('login-btn');
function genUID(){ return 'u_'+Date.now().toString(36)+Math.random().toString(36).slice(2); }

function handleLogin(){
    const name=usernameInput.value.trim();
    if(!name){ usernameInput.focus(); showToast('Nama wajib diisi!','warn'); return; }
    displayName=name;
    let uid=localStorage.getItem('flora_uid');
    if(!uid){ uid=genUID(); localStorage.setItem('flora_uid',uid); }
    localStorage.setItem('flora_display_name',name);
    currentUID=uid; initApp(name,uid);
}
loginBtn?.addEventListener('click', handleLogin);
usernameInput?.addEventListener('keypress', e=>{ if(e.key==='Enter') handleLogin(); });

function initApp(name, uid){
    document.getElementById('auth-layer').style.display='none';
    document.getElementById('app-interface').style.opacity=1;
    startSugg();
    onValue(ref(db,'chats/'+uid), snap=>{
        allSessions=snap.val()||{};
        renderSidebar();
        if(isFirstLoad){ isFirstLoad=false; showWelcomeScreen(); }
    });
}

window.onload=()=>{
    const uid=localStorage.getItem('flora_uid'), name=localStorage.getItem('flora_display_name');
    if(uid&&name){ currentUID=uid; displayName=name; initApp(name,uid); }
    else{ document.getElementById('auth-layer').style.display='flex'; usernameInput?.focus(); }
};

function updateDockPos(isWelcome){
    const dock=document.getElementById('input-dock');
    if(window.innerWidth>768) dock.classList.toggle('centered',isWelcome);
    else dock.classList.remove('centered');
}

function save(){ if(currentUID) set(ref(db,'chats/'+currentUID),allSessions); }

function dateLabel(ts){
    const d=new Date(ts),t=new Date(),y=new Date(t); y.setDate(y.getDate()-1);
    if(d.toDateString()===t.toDateString()) return 'Hari Ini';
    if(d.toDateString()===y.toDateString()) return 'Kemarin';
    return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
}

function renderSidebar(){
    const list=document.getElementById('history-list'); list.innerHTML='';
    const ids=Object.keys(allSessions).sort((a,b)=>b-a);
    let lastHdr='';
    ids.forEach(id=>{
        const s=allSessions[id], hdr=dateLabel(s.timestamp);
        if(hdr!==lastHdr){ const d=document.createElement('div'); d.className='history-date'; d.innerText=hdr; list.appendChild(d); lastHdr=hdr; }
        const div=document.createElement('div');
        div.className=`history-item ${id===currentSessionId?'active':''}`;
        div.onclick=()=>loadSession(id);
        div.innerHTML=`<div class="history-title">${s.title}</div>`;
        list.appendChild(div);
    });
}

window.startNewChat=function(){ currentSessionId=Date.now().toString(); showWelcomeScreen(); renderSidebar(); if(window.innerWidth<=768) toggleSidebar(); };
window.useStarter=function(text){ const ta=document.getElementById('user-input'); ta.value=text; handleInputChange(ta); processInput(); };
window.loadSession=function(id){
    currentSessionId=id; const s=allSessions[id];
    document.getElementById('msg-container').innerHTML='';
    if(!s||!s.messages?.length) showWelcomeScreen();
    else{ s.messages.forEach(m=>addBubble(m.content,m.role,m.image,false,false)); updateDockPos(false); }
    renderSidebar(); if(window.innerWidth<=768) toggleSidebar();
};

function buildHTML(code,lang){
    if(lang==='javascript'||lang==='js') return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:system-ui,sans-serif;padding:20px;background:#f8f9fa;color:#1a1a1a;}#output{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;min-height:60px;font-family:'SF Mono',monospace;font-size:13px;line-height:1.6;}h3{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}.err{color:#ef4444;}</style></head><body><h3>⚙ Console Output</h3><div id="output"><i style="color:#9ca3af">Menjalankan...</i></div><script>const o=document.getElementById('output');let f=true;console.log=function(...a){if(f){o.innerHTML='';f=false;}o.innerHTML+='<div>> '+a.join(' ')+'</div>';};try{${code}}catch(e){o.innerHTML='<div class="err">✗ '+e.message+'</div>';}<\/script></body></html>`;
    if(lang==='css') return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;}body{font-family:system-ui,sans-serif;padding:24px;background:#fff;}${code}</style></head><body><h1>Heading H1</h1><h2>Heading H2</h2><p>Paragraf dengan <strong>bold</strong> dan <a href="#">link</a>.</p><button>Tombol</button><div class="card box container wrapper"><p>Div contoh</p></div><ul><li>Item satu</li><li>Item dua</li></ul></body></html>`;
    return code;
}

function renderIframe(iframe,code,lang){ iframe.srcdoc=buildHTML(code,lang); }

window.switchTab=function(id,tab){
    const w=document.getElementById(id); if(!w) return;
    const cp=w.querySelector('.code-pane'), pp=w.querySelector('.preview-pane');
    const bc=w.querySelector('.tab-btn[data-tab="code"]'), bp=w.querySelector('.tab-btn[data-tab="preview"]');
    if(tab==='code'){ cp.classList.remove('hidden'); pp.classList.remove('active'); bc.classList.add('active'); bp.classList.remove('active'); }
    else{
        cp.classList.add('hidden'); pp.classList.add('active'); bc.classList.remove('active'); bp.classList.add('active');
        const iframe=pp.querySelector('iframe'), loading=pp.querySelector('.preview-loading');
        if(iframe&&!iframe.dataset.rendered){
            renderIframe(iframe, window._codeStore.get(id)||'', w.dataset.lang||'html');
            iframe.dataset.rendered='1';
            if(loading) iframe.addEventListener('load',()=>{ loading.style.display='none'; },{once:true});
        }
    }
};

window.refreshInlinePreview=function(id){
    const w=document.getElementById(id); if(!w) return;
    const iframe=w.querySelector('.preview-pane iframe'); if(!iframe) return;
    iframe.dataset.rendered='';
    renderIframe(iframe, window._codeStore.get(id)||'', w.dataset.lang||'html');
    iframe.dataset.rendered='1';
};

window.openFullscreenPreview=function(id){
    const w=document.getElementById(id); if(!w) return;
    _modalCode=window._codeStore.get(id)||''; _modalLang=w.dataset.lang||'html';
    document.getElementById('modal-lang-badge').textContent=_modalLang.toUpperCase();
    document.getElementById('modal-title-text').textContent='Live Preview — '+_modalLang.toUpperCase();
    renderIframe(document.getElementById('modal-preview-iframe'),_modalCode,_modalLang);
    const cd=document.getElementById('modal-code-display'); cd.textContent=_modalCode; cd.className='language-'+_modalLang;
    if(window.Prism) Prism.highlightElement(cd);
    document.getElementById('code-preview-modal').classList.add('show');
    document.body.style.overflow='hidden';
};

window.closeFullscreenPreview=function(){
    document.getElementById('code-preview-modal').classList.remove('show');
    document.body.style.overflow=''; _splitActive=false;
    document.getElementById('modal-code-panel').classList.add('collapsed');
    document.getElementById('split-toggle-btn').innerHTML='<i class="fa-solid fa-table-columns"></i> Split View';
};

window.toggleSplitView=function(){
    _splitActive=!_splitActive;
    const p=document.getElementById('modal-code-panel'), b=document.getElementById('split-toggle-btn');
    if(_splitActive){ p.classList.remove('collapsed'); p.style.width='45%'; b.innerHTML='<i class="fa-solid fa-square"></i> Preview Only'; }
    else{ p.classList.add('collapsed'); b.innerHTML='<i class="fa-solid fa-table-columns"></i> Split View'; }
};

window.refreshModalPreview=function(){ renderIframe(document.getElementById('modal-preview-iframe'),_modalCode,_modalLang); };
window.copyModalCode=function(){
    navigator.clipboard.writeText(_modalCode).then(()=>{
        showToast('Kode disalin!','success');
        const btn=document.querySelector('.preview-modal-btn[onclick="copyModalCode()"]');
        if(btn){ btn.innerHTML='<i class="fa-solid fa-check"></i> Tersalin!'; setTimeout(()=>{ btn.innerHTML='<i class="fa-solid fa-copy"></i> Salin Kode'; },2000); }
    });
};
window.startDrag=function(e){
    if(!_splitActive) return; e.preventDefault();
    const div=document.getElementById('modal-divider'), panel=document.getElementById('modal-code-panel'), cont=div.parentElement;
    div.classList.add('dragging');
    const mv=ev=>{ const r=cont.getBoundingClientRect(); panel.style.width=Math.min(Math.max(((ev.clientX-r.left)/r.width)*100,20),70)+'%'; };
    const up=()=>{ div.classList.remove('dragging'); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeFullscreenPreview(); });

// FORMAT CONTENT

let _bc=0;
window.formatBotContent=function(text){
    return text.replace(/\n/g,'<br>').replace(/```(\w*)([\s\S]*?)```/g,(m,lang,code)=>{
        const language=lang.trim()||'javascript';
        const clean=code.replace(/<br>/g,'\n').trim();
        const esc=clean.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const ll=language.toLowerCase();
        const canPrev=['html','htm','javascript','js','css'].includes(ll)||clean.includes('<html')||clean.includes('<!DOCTYPE');
        const bid='codeblock-'+(++_bc);
        window._codeStore.set(bid,clean);
        const prevTab=canPrev?`<button class="tab-btn" data-tab="preview" onclick="switchTab('${bid}','preview')"><span class="tab-dot"></span> Preview</button>`:'';
        const prevPane=canPrev?`<div class="preview-pane"><div class="preview-loading"><div class="preview-spinner"></div><span>Merender...</span></div><iframe sandbox="allow-scripts allow-same-origin allow-forms allow-modals" style="width:100%;min-height:320px;border:none;display:block;"></iframe><div class="preview-status-bar"><div class="status-dot"></div><span>Preview siap</span><button class="status-refresh-btn" onclick="refreshInlinePreview('${bid}')"><i class="fa-solid fa-rotate-right"></i> Refresh</button></div></div>`:'';
        const fsBtn=canPrev?`<button class="code-btn" onclick="openFullscreenPreview('${bid}')"><i class="fa-solid fa-expand"></i> Fullscreen</button>`:'';
        return `<div class="code-block-wrapper" id="${bid}" data-lang="${ll}">
            <div class="code-tab-bar">
                <span class="code-lang-badge">${language}</span>
                <div class="tab-switcher">
                    <button class="tab-btn active" data-tab="code" onclick="switchTab('${bid}','code')"><span class="tab-dot"></span> Kode</button>
                    ${prevTab}
                </div>
                <div class="code-actions-right">${fsBtn}<button class="code-btn" onclick="copyInlineCode(this,'${bid}')"><i class="fa-solid fa-copy"></i> Salin</button></div>
            </div>
            <div class="code-pane"><pre><code class="language-${language}">${esc}</code></pre></div>
            ${prevPane}
        </div>`;
    });
};

window.copyInlineCode=function(btn,bid){
    navigator.clipboard.writeText(window._codeStore.get(bid)||'').then(()=>{
        btn.classList.add('success'); btn.innerHTML='<i class="fa-solid fa-check"></i> Tersalin!';
        showToast('Kode disalin!','success',2000);
        setTimeout(()=>{ btn.classList.remove('success'); btn.innerHTML='<i class="fa-solid fa-copy"></i> Salin'; },2000);
    });
};

// SEND MESSAGE — STREAMING + ALL FEATURES
// ═══════════════════════════════════════
async function sendMessage(overrideTxt, replaceMsgId){
    const input=document.getElementById('user-input');
    const txt=overrideTxt||input.value.trim();
    if(!txt&&!currentImg64) return;

    document.getElementById('welcome-screen')?.remove();

    if(!allSessions[currentSessionId]){
        allSessions[currentSessionId]={title:txt.substring(0,25)+'...', timestamp:Date.now(), messages:[]};
    } else if(!allSessions[currentSessionId].messages?.length){
        allSessions[currentSessionId].title=txt.substring(0,25)+'...';
    }

    const imgToSend=currentImg64;
    if(!overrideTxt){
        addBubble(txt,'user',imgToSend,false,true);
        input.value=''; handleInputChange(input); clearImage();
    }

    const payload={history:(allSessions[currentSessionId].messages||[]).slice(-10), message:txt, image:imgToSend};

    // Create or reuse bot msg container
    let msgDiv;
    if(replaceMsgId){
        msgDiv=document.getElementById(replaceMsgId);
        if(msgDiv) msgDiv.innerHTML='';
        else{ msgDiv=document.createElement('div'); msgDiv.className='msg-group bot'; msgDiv.id='msg-'+Date.now(); document.getElementById('msg-container').appendChild(msgDiv); }
    } else {
        msgDiv=document.createElement('div'); msgDiv.className='msg-group bot'; msgDiv.id='msg-'+Date.now();
        document.getElementById('msg-container').appendChild(msgDiv);
    }

    // Avatar with glow
    const avatarEl=document.createElement('div');
    avatarEl.className='avatar thinking-glow';
    avatarEl.innerHTML='<i class="fa-solid fa-spa"></i>';

    const wrap=document.createElement('div');
    wrap.style.cssText='flex:1;min-width:0;';

    const {thinkId, block:thinkBlock}=window.createThinkingBlock(msgDiv.id);
    msgDiv.appendChild(avatarEl);
    msgDiv.appendChild(wrap);
    wrap.appendChild(thinkBlock);

    const contentDiv=document.createElement('div');
    contentDiv.className='bot-content';
    contentDiv.id='content-'+msgDiv.id;

    // 🤖 Robot: mulai berpikir
    document.dispatchEvent(new CustomEvent('flora:thinkStart'));

    if(_isAtBottom) scrollToBottom(false); else bumpNewMsg();

    try {
        const res=await fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        if(!res.ok) throw new Error('Gagal terhubung.');

        const reader=res.body.getReader();
        const decoder=new TextDecoder('utf-8');
        let fullText='', buf='', started=false;

        // Typewriter cursor
        const cursor=document.createElement('span');
        cursor.className='tw-cursor';

        while(true){
            const {done,value}=await reader.read();
            if(done) break;
            buf+=decoder.decode(value,{stream:true});
            const lines=buf.split('\n'); buf=lines.pop();
            for(const line of lines){
                if(!line.trim()||line.includes('[DONE]')) continue;
                if(line.startsWith('data: ')){
                    try{
                        const d=JSON.parse(line.slice(6));
                        if(d.text){
                            if(!started){
                                started=true;
                                window.finishThinkingBlock(thinkId);
                                avatarEl.classList.remove('thinking-glow');
                                wrap.appendChild(contentDiv);
                                // 🤖 Robot: streaming dimulai
                                document.dispatchEvent(new CustomEvent('flora:streamStart'));
                            }
                            fullText+=d.text;
                            contentDiv.innerHTML=window.formatBotContent(fullText);
                            contentDiv.appendChild(cursor);
                            if(_isAtBottom) scrollToBottom(false); else bumpNewMsg();
                        }
                    } catch(e){}
                }
            }
        }

        if(!started){ window.finishThinkingBlock(thinkId); avatarEl.classList.remove('thinking-glow'); }
        cursor.remove();
        // 🤖 Robot: streaming selesai, deteksi mood dari teks
        document.dispatchEvent(new CustomEvent('flora:streamEnd', { detail: { text: fullText } }));
        if(window.Prism) Prism.highlightAllUnder(msgDiv);

        // Add action bar
        msgDiv.appendChild(buildMsgActions(msgDiv.id,'bot',()=>fullText));

        if(!allSessions[currentSessionId].messages) allSessions[currentSessionId].messages=[];
        allSessions[currentSessionId].messages.push({role:'assistant',content:fullText,image:null});
        save();

    } catch(e){
        window.finishThinkingBlock(thinkId);
        avatarEl.classList.remove('thinking-glow');
        wrap.appendChild(contentDiv);
        contentDiv.innerHTML=`<div style="color:#ef4444;padding:12px;">Error: ${e.message}</div>`;
        showToast('Gagal: '+e.message,'error');
    }
}

async function sendDrawRequest(prompt){
    document.getElementById('welcome-screen')?.remove();
    if(!allSessions[currentSessionId]) allSessions[currentSessionId]={title:prompt,timestamp:Date.now(),messages:[]};
    addBubble('Gambarkan: '+prompt,'user',null,false,true);
    const ta=document.getElementById('user-input'); ta.value=''; handleInputChange(ta);
    const lid=addBubble('','bot',null,true,false);
    try{
        const res=await fetch('/api/draw',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
        const data=await res.json();
        if(!res.ok||!data.success) throw new Error(data.error||'Gagal.');
        document.getElementById(lid)?.remove();
        const imgs=data.images||(data.url?[data.url]:[]);
        if(imgs.length) addBubble(`Hasil untuk: ${prompt}`,'bot',imgs,false,true);
        else throw new Error('Tidak ada gambar.');
        showToast('Gambar selesai!','success');
    } catch(e){ const el=document.getElementById(lid); if(el) el.innerHTML=`<div style="color:#ef4444;padding:12px;">Gagal: ${e.message}</div>`; showToast('Gagal generate','error'); }
}

async function sendImageToEditor(){
    const input=document.getElementById('user-input'), txt=input.value.trim();
    if(!txt){ showToast('Tulis instruksinya dulu!','warn'); return; }
    document.getElementById('welcome-screen')?.remove();
    if(!allSessions[currentSessionId]) allSessions[currentSessionId]={title:'Edit Gambar',timestamp:Date.now(),messages:[]};
    const imgToSend=currentImg64;
    addBubble('Edit: '+txt,'user',imgToSend,false,true);
    input.value=''; handleInputChange(input); clearImage();
    const lid=addBubble('','bot',null,true,false);
    try{
        const r1=await fetch('/api/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step:'start',image:imgToSend,prompt:txt})});
        const d1=await r1.json();
        if(!d1.success) throw new Error(d1.error||'Gagal.');
        let attempts=0;
        const poll=setInterval(async()=>{
            attempts++;
            try{
                const r2=await fetch('/api/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step:'check',jobId:d1.jobId})});
                const d2=await r2.json();
                if(d2.status==='done'){ clearInterval(poll); document.getElementById(lid)?.remove(); addBubble('Selesai edit: '+txt,'bot',d2.url,false,true); showToast('Edit selesai!','success'); }
                else if(d2.status==='failed'||attempts>=20){ clearInterval(poll); throw new Error('Gagal/timeout.'); }
            } catch(e2){ clearInterval(poll); const el=document.getElementById(lid); if(el) el.innerHTML=`<div style="color:#ef4444">Error: ${e2.message}</div>`; }
        },3000);
    } catch(e){ const el=document.getElementById(lid); if(el) el.innerHTML=`<div style="color:#ef4444">Error: ${e.message}</div>`; }
}

function addBubble(text,role,img,isLoading,saveToMem){
    const container=document.getElementById('msg-container');
    const div=document.createElement('div');
    div.className='msg-group '+role; div.id='msg-'+Date.now();
    const rawText=text;

    if(saveToMem&&allSessions[currentSessionId]){
        if(!allSessions[currentSessionId].messages) allSessions[currentSessionId].messages=[];
        allSessions[currentSessionId].messages.push({role:role==='user'?'user':'assistant',content:text,image:img});
        save();
    }

    if(role==='user'){
        const imgHtml=img?`<img src="${img}" style="max-width:180px;border-radius:10px;margin-bottom:8px;display:block;">` : '';
        div.innerHTML=`<div class="bubble">${imgHtml}<div>${text.replace(/\n/g,'<br>')}</div></div>`;
        setTimeout(()=>div.appendChild(buildMsgActions(div.id,'user',()=>rawText)),0);
    } else {
        if(isLoading){
            div.innerHTML=`<div class="avatar"><i class="fa-solid fa-spa"></i></div><div style="padding:10px 0;"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
        } else {
            let media='';
            if(Array.isArray(img)) media=`<div class="img-grid">${img.map(u=>`<a href="${u}" target="_blank"><img src="${u}" loading="lazy" onerror="this.style.display='none'"></a>`).join('')}</div>`;
            else if(img) media=`<div class="single-img"><a href="${img}" target="_blank"><img src="${img}" referrerpolicy="no-referrer"></a></div>`;
            div.innerHTML=`<div class="avatar"><i class="fa-solid fa-spa"></i></div><div class="bot-content">${media}${window.formatBotContent(text)}</div>`;
            setTimeout(()=>div.appendChild(buildMsgActions(div.id,'bot',()=>rawText)),0);
        }
    }

    container.appendChild(div);
    if(window.Prism) Prism.highlightAll();
    if(_isAtBottom) scrollToBottom(false); else bumpNewMsg();
    return div.id;
}

window.processInput=function(){
    const input=document.getElementById('user-input'), txt=input.value.trim();
    if(!txt&&!currentImg64) return;
    updateDockPos(false);
    if(imgMode==='edit'){ if(currentImg64){ sendImageToEditor(); return; } else { sendDrawRequest(txt); return; } }
    const dm=txt.match(/^(gambarkan|buatkan gambar|buat gambar|\/img|\/draw)\s+(.+)/i);
    if(dm){ sendDrawRequest(dm[2]); return; }
    sendMessage();
};

window.activateDrawMode=function(){ const i=document.getElementById('user-input'); i.value='Gambarkan '; handleInputChange(i); i.focus(); };
window.setImgMode=function(mode){
    imgMode=mode;
    document.querySelectorAll('.preview-mode-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('mode-'+mode).classList.add('active');
    document.getElementById('user-input').placeholder=mode==='edit'?'Tulis gaya editnya...':'Tanya sesuatu tentang gambar ini...';
};
window.handleFile=function(inp){
    const file=inp.files[0]; if(!file) return;
    if(!file.type.startsWith('image/')){ showToast('Pilih file gambar!','warn'); return; }
    const reader=new FileReader();
    reader.onload=e=>{
        const img=new Image(); img.src=e.target.result;
        img.onload=()=>{
            const canvas=document.createElement('canvas'); let w=img.width,h=img.height,MAX=800;
            if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
            canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
            currentImg64=canvas.toDataURL('image/jpeg',.7);
            setImgMode('vision');
            document.getElementById('preview-img-element').src=currentImg64;
            document.getElementById('img-preview-box').classList.add('show');
            showToast('Gambar siap dianalisis','success',2000);
        };
    };
    reader.readAsDataURL(file);
};

<script>
(function(){
    // ─── CONFIG ───
    const PUPIL_MAX = 5.5; // max px pupils travel
    const MOODS = {
        idle:      { badge:'😊 idle',     brow:'M24 46 Q37 40 50 46|M60 46 Q73 40 86 46', mouth:'M38 82 Q55 91 72 82', cheek:.35 },
        happy:     { badge:'😄 senang',   brow:'M24 44 Q37 38 50 44|M60 44 Q73 38 86 44', mouth:'M36 80 Q55 96 74 80', cheek:.6  },
        excited:   { badge:'🤩 excited',  brow:'M24 43 Q37 37 50 43|M60 43 Q73 37 86 43', mouth:'M38 79 Q55 97 72 79', cheek:.7  },
        thinking:  { badge:'🤔 berpikir', brow:'M24 44 Q37 40 50 48|M60 48 Q73 40 86 44', mouth:'M40 85 Q55 83 70 85', cheek:.2  },
        confused:  { badge:'😕 bingung',  brow:'M24 48 Q37 40 50 44|M60 44 Q73 40 86 48', mouth:'M40 86 Q55 80 70 87', cheek:.25 },
        streaming: { badge:'💬 ngetik',   brow:'M24 46 Q37 40 50 46|M60 46 Q73 40 86 46', mouth:'M40 83 Q55 89 70 83', cheek:.4  },
        error:     { badge:'😰 error',    brow:'M26 48 Q37 46 50 52|M60 52 Q73 46 86 48', mouth:'M38 88 Q55 80 72 88', cheek:.15 },
    };

    let currentMood = 'idle';
    let isStreaming = false;
    let streamPhase = 0;
    let streamAnim = null;
    let blinkTimer = null;

    const wrap    = document.getElementById('flora-robot-wrap');
    const browL   = document.getElementById('brow-l');
    const browR   = document.getElementById('brow-r');
    const mouth   = document.getElementById('robot-mouth');
    const cheekL  = document.getElementById('cheek-l');
    const cheekR  = document.getElementById('cheek-r');
    const blinkL  = document.getElementById('blink-l');
    const blinkR  = document.getElementById('blink-r');
    const badge   = document.getElementById('robot-mood-badge');
    const pGroupL = document.getElementById('pupil-group-l');
    const pGroupR = document.getElementById('pupil-group-r');
    const svg     = document.getElementById('flora-svg');

    // ─── APPLY MOOD ───
    function applyMood(key) {
        const m = MOODS[key] || MOODS.idle;
        currentMood = key;
        badge.textContent = m.badge;
        const [bl, br] = m.brow.split('|');
        browL.setAttribute('d', bl);
        browR.setAttribute('d', br);
        mouth.setAttribute('d', m.mouth);
        cheekL.style.opacity = m.cheek;
        cheekR.style.opacity = m.cheek;
    }

    // ─── EYE TRACKING ───
    let robotCX = 0, robotCY = 0;

    function updateRobotCenter() {
        const r = svg.getBoundingClientRect();
        // eye centers in SVG coords mapped to screen
        const scaleX = r.width / 110;
        const scaleY = r.height / 120;
        robotCX = r.left + 37 * scaleX;
        robotCY = r.top  + 62 * scaleY;
    }

    function movePupils(mx, my) {
        if(isStreaming) return; // eyes animate differently during stream
        updateRobotCenter();
        const r = svg.getBoundingClientRect();
        const scaleX = r.width / 110, scaleY = r.height / 120;

        // Left eye
        const dxL = mx - (r.left + 37*scaleX);
        const dyL = my - (r.top  + 62*scaleY);
        const distL = Math.sqrt(dxL*dxL + dyL*dyL) || 1;
        const clampL = Math.min(distL, PUPIL_MAX * Math.min(scaleX, scaleY)) / distL;
        pGroupL.setAttribute('transform', `translate(${dxL*clampL/scaleX} ${dyL*clampL/scaleY})`);

        // Right eye
        const dxR = mx - (r.left + 73*scaleX);
        const dyR = my - (r.top  + 62*scaleY);
        const distR = Math.sqrt(dxR*dxR + dyR*dyR) || 1;
        const clampR = Math.min(distR, PUPIL_MAX * Math.min(scaleX, scaleY)) / distR;
        pGroupR.setAttribute('transform', `translate(${dxR*clampR/scaleX} ${dyR*clampR/scaleY})`);
    }

    document.addEventListener('mousemove', e => movePupils(e.clientX, e.clientY));

    // Touch support
    document.addEventListener('touchmove', e => {
        const t = e.touches[0];
        if(t) movePupils(t.clientX, t.clientY);
    }, { passive: true });

    // ─── BLINK ───
    function doBlink() {
        blinkL.style.transform = 'scaleY(1)';
        blinkR.style.transform = 'scaleY(1)';
        setTimeout(() => {
            blinkL.style.transform = 'scaleY(0)';
            blinkR.style.transform = 'scaleY(0)';
        }, 120);
        scheduleBlink();
    }

    function scheduleBlink() {
        clearTimeout(blinkTimer);
        const delay = 2500 + Math.random() * 4000;
        blinkTimer = setTimeout(doBlink, delay);
    }
    scheduleBlink();

    // ─── STREAMING MOUTH ANIMATION ───
    const mouthFrames = [
        'M40 83 Q55 89 70 83',
        'M40 80 Q55 94 70 80',
        'M40 84 Q55 87 70 84',
        'M40 79 Q55 96 70 79',
        'M40 83 Q55 88 70 83',
    ];

    function startStreamAnim() {
        if(streamAnim) return;
        streamPhase = 0;
        streamAnim = setInterval(() => {
            streamPhase = (streamPhase + 1) % mouthFrames.length;
            mouth.setAttribute('d', mouthFrames[streamPhase]);
            // Subtle eye wobble during stream
            const wobble = Math.sin(Date.now() / 200) * 1.5;
            pGroupL.setAttribute('transform', `translate(0 ${wobble})`);
            pGroupR.setAttribute('transform', `translate(0 ${-wobble})`);
        }, 160);
    }

    function stopStreamAnim() {
        if(streamAnim) { clearInterval(streamAnim); streamAnim = null; }
        pGroupL.setAttribute('transform', 'translate(0 0)');
        pGroupR.setAttribute('transform', 'translate(0 0)');
    }

    // ─── BOUNCE ───
    function doBounce() {
        wrap.classList.remove('bounce');
        void wrap.offsetWidth; // reflow
        wrap.classList.add('bounce');
        wrap.addEventListener('animationend', () => wrap.classList.remove('bounce'), { once: true });
    }

    // ─── MOOD DETECTION ───
    function detectMood(text) {
        const t = text.toLowerCase();
        const excite  = /wow|luar biasa|keren|mantap|hebat|selesai|berhasil|sukses|done|siap/.test(t);
        const happy   = /senang|bagus|baik|tentu|oke|sip|benar|yuk|ayo|halo|hei/.test(t);
        const confused= /maaf|tidak tahu|kurang yakin|bingung|belum|hmm|wah|tunggu|coba/.test(t);
        const thinking= /karena|karena itu|jadi|oleh karena|dengan demikian|pertama|kedua|ketiga|langkah/.test(t);
        const error   = /error|gagal|salah|tidak bisa|tidak dapat|masalah|crash/.test(t);
        if(excite)   return 'excited';
        if(error)    return 'error';
        if(confused) return 'confused';
        if(thinking) return 'thinking';
        if(happy)    return 'happy';
        return 'idle';
    }

    // ─── PUBLIC API (hook into sendMessage) ───
    window.floraRobot = {
        setMood(key)     { applyMood(key); },
        startStreaming() {
            isStreaming = true;
            applyMood('streaming');
            startStreamAnim();
        },
        stopStreaming(text) {
            isStreaming = false;
            stopStreamAnim();
            applyMood(detectMood(text || ''));
        },
        bounce() { doBounce(); },
        detectAndSet(text) { applyMood(detectMood(text)); },
    };

    // Initialize
    applyMood('idle');
})();
</script>

<!-- HOOK ROBOT INTO SENDMESSAGE -->
<script type="module">
// Patch sendMessage to call floraRobot hooks
// We intercept via MutationObserver on msg-container + override approach

// Since sendMessage is in a module scope, we hook via custom events
// Dispatch events from inline script and listen here

document.addEventListener('flora:thinkStart', () => {
    window.floraRobot?.setMood('thinking');
});
document.addEventListener('flora:streamStart', () => {
    window.floraRobot?.startStreaming();
});
document.addEventListener('flora:streamEnd', e => {
    window.floraRobot?.stopStreaming(e.detail?.text || '');
});
document.addEventListener('flora:newMsg', () => {
    window.floraRobot?.bounce();
});

// MutationObserver to detect new messages and bounce
const obs = new MutationObserver(mutations => {
    for(const m of mutations) {
        for(const node of m.addedNodes) {
            if(node.nodeType === 1 && node.classList?.contains('msg-group')) {
                window.floraRobot?.bounce();
            }
        }
    }
});
const container = document.getElementById('msg-container');
if(container) obs.observe(container, { childList: true });
</script>
