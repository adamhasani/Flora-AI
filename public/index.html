function getDateCategory(timestamp) {
const date = new Date(timestamp);
const today = new Date();
const yesterday = new Date(today);
yesterday.setDate(yesterday.getDate() - 1);
if (date.toDateString() === today.toDateString()) return "Hari Ini";
if (date.toDateString() === yesterday.toDateString()) return "Kemarin";
return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
}
function renderSidebar() {
const list = document.getElementById('history-list');
list.innerHTML = "";
if (!allSessions) return;
const sortedIds = Object.keys(allSessions).sort((a, b) => b - a);
let lastHeader = "";
sortedIds.forEach(id => {
const session = allSessions[id];
const header = getDateCategory(session.timestamp);
if (header !== lastHeader) {
const headerDiv = document.createElement('div');
headerDiv.className = 'history-date';
headerDiv.innerText = header;
list.appendChild(headerDiv);
lastHeader = header;
}
const div = document.createElement('div');
div.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
div.onclick = () => loadSession(id);
div.innerHTML = `<div class="history-title">${session.title}</div>`;
list.appendChild(div);
});
}

updateInputDockPosition(false);
}
renderSidebar();

};

// ===== IMPROVED PREVIEW SYSTEM =====
function buildPreviewHTML(code, lang) {
const MAX_CODE_SIZE = 50000;
if (code.length > MAX_CODE_SIZE) {
return `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="font-family:system-ui,sans-serif;padding:40px;background:#f8f9fa;color:#1a1a1a;text-align:center;"><div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:24px;"><h3 style="color:#d97706;margin-bottom:8px;">⚠️ Kode Terlalu Besar</h3><p style="color:#92400e;font-size:13px;">Preview tidak tersedia untuk kode >50KB. Silakan gunakan Fullscreen atau salin kode.</p></div></body></html>`;
}

if (lang === 'javascript' || lang === 'js') {
return `<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<style>
body{font-family:system-ui,sans-serif;padding:20px;background:#f8f9fa;color:#1a1a1a;}
#output{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;min-height:60px;font-family:'SF Mono',monospace;font-size:13px;line-height:1.6;}
h3{font-size:13px;font-weight:600;color:#6b7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
.err{color:#ef4444;}
</style>
</head><body>
<h3>⚙ Console Output</h3>
<div id="output"><i style="color:#9ca3af">Menjalankan script...</i></div>
<script>
const out=document.getElementById('output');
let first=true;
console.log=function(...a){
if(first){out.innerHTML='';first=false;}
out.innerHTML+='<div>> '+a.join(' ')+'</div>';
};
try{${code.substring(0, 30000)}}catch(e){out.innerHTML='<div class="err">✗ Error: '+e.message+'</div>';}
<\/script>
</body></html>`;
}

if (lang === 'css') {
return `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
*{box-sizing:border-box;}
body{font-family:system-ui,sans-serif;padding:24px;background:#fff;}
${code.substring(0, 30000)}
</style>
</head><body>
<h1>Heading H1</h1><h2>Heading H2</h2>
<p>Ini contoh paragraf. <strong>Bold</strong>, <em>italic</em>, dan <a href="#">link</a>.</p>
<button>Tombol</button> <button class="btn">Button Class</button>
<div class="card box container wrapper"><p>Div dengan class umum</p></div>
<ul><li>Item satu</li><li>Item dua</li><li>Item tiga</li></ul>
<input type="text" placeholder="Input teks" style="margin-top:8px">
</body></html>`;
}

const hasHtmlTag = code.includes('<html') || code.includes('<!DOCTYPE');
const hasHeadTag = code.includes('<head');
const hasBodyTag = code.includes('<body');
const hasStyleTag = code.includes('<style');

if (hasHtmlTag) {
return code.substring(0, MAX_CODE_SIZE);
} else if (hasHeadTag || hasBodyTag || hasStyleTag) {
if (!hasHtmlTag) {
return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">${hasHeadTag ? '' : '<style>body{font-family:system-ui,sans-serif;padding:20px;}</style>'}</head><body>${code.substring(0, MAX_CODE_SIZE)}</body></html>`;
}
return code.substring(0, MAX_CODE_SIZE);
} else {
return `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>body{font-family:system-ui,sans-serif;padding:20px;background:#fff;white-space:pre-wrap;}</style></head><body>${code.substring(0, MAX_CODE_SIZE)}</body></html>`;
}
}

function renderToIframe(iframe, code, lang) {
if (!iframe) return;

const html = buildPreviewHTML(code, lang);
const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

try {
iframeDoc.open();
iframeDoc.write(html);
iframeDoc.close();

const timeoutId = setTimeout(() => {
if (iframe && iframeDoc.readyState !== 'complete') {
iframeDoc.open();
iframeDoc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="font-family:system-ui,sans-serif;padding:40px;background:#fef3c7;color:#92400e;text-align:center;"><div style="background:#fff;border:1px solid #f59e0b;border-radius:8px;padding:24px;"><h3>⏱️ Timeout</h3><p style="font-size:13px;">Preview membutuhkan waktu terlalu lama. Kode mungkin terlalu kompleks.</p></div></body></html>');
iframeDoc.close();
}
}, 5000);

iframe.onload = () => { clearTimeout(timeoutId); };
} catch (e) {
iframeDoc.open();
iframeDoc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="font-family:system-ui,sans-serif;padding:40px;background:#fee2e2;color:#991b1b;text-align:center;"><div style="background:#fff;border:1px solid #ef4444;border-radius:8px;padding:24px;"><h3>❌ Error Render</h3><p style="font-size:13px;">' + e.message + '</p></div></body></html>');
iframeDoc.close();
}
}

window.switchTab = function (blockId, tab) {
const wrapper = document.getElementById(blockId);
if (!wrapper) return;
const codePaneEl = wrapper.querySelector('.code-pane');
const previewPaneEl = wrapper.querySelector('.preview-pane');
const btnCode = wrapper.querySelector('.tab-btn[data-tab="code"]');
const btnPreview = wrapper.querySelector('.tab-btn[data-tab="preview"]');
if (tab === 'code') {
codePaneEl.classList.remove('hidden');
previewPaneEl.classList.remove('active');
btnCode.classList.add('active');
btnPreview.classList.remove('active');
} else {
codePaneEl.classList.add('hidden');
previewPaneEl.classList.add('active');
btnCode.classList.remove('active');
btnPreview.classList.add('active');
const iframe = previewPaneEl.querySelector('iframe');
const loading = previewPaneEl.querySelector('.preview-loading');
if (iframe && !iframe.dataset.rendered) {
const rawCode = decodeURIComponent(wrapper.dataset.code);
const lang = wrapper.dataset.lang || 'html';

if (rawCode.length > 50000) {
if (loading) loading.style.display = 'none';
previewPaneEl.innerHTML = '<div class="preview-error"><i class="fa-solid fa-triangle-exclamation"></i><div>⚠️ Kode terlalu besar untuk preview (>50KB). Gunakan Fullscreen atau salin kode.</div></div>';
return;
}

renderToIframe(iframe, rawCode, lang);
iframe.dataset.rendered = '1';
if (loading) {
iframe.addEventListener('load', () => { if (loading) loading.style.display = 'none'; }, { once: true });
setTimeout(() => { if (loading && loading.style.display !== 'none') loading.style.display = 'none'; }, 5000);
}
}
}
};

window.refreshInlinePreview = function (blockId) {
const wrapper = document.getElementById(blockId);
if (!wrapper) return;
const iframe = wrapper.querySelector('.preview-pane iframe');
if (!iframe) return;
const rawCode = decodeURIComponent(wrapper.dataset.code);
const lang = wrapper.dataset.lang || 'html';
iframe.dataset.rendered = '';
renderToIframe(iframe, rawCode, lang);
iframe.dataset.rendered = '1';
};

window.openFullscreenPreview = function (blockId) {
const wrapper = document.getElementById(blockId);
if (!wrapper) return;
_modalCode = decodeURIComponent(wrapper.dataset.code);
_modalLang = wrapper.dataset.lang || 'html';

if (_modalCode.length > 100000) {
alert('⚠️ Kode sangat besar (' + Math.round(_modalCode.length/1024) + 'KB). Preview mungkin lambat.');
}

document.getElementById('modal-lang-badge').textContent = _modalLang.toUpperCase();
document.getElementById('modal-title-text').textContent = 'Live Preview — ' + (_modalLang.toUpperCase());
const modalIframe = document.getElementById('modal-preview-iframe');
renderToIframe(modalIframe, _modalCode, _modalLang);
const codeDisplay = document.getElementById('modal-code-display');
codeDisplay.textContent = _modalCode;
codeDisplay.className = `language-${_modalLang}`;
if (window.Prism) Prism.highlightElement(codeDisplay);
document.getElementById('code-preview-modal').classList.add('show');
document.body.style.overflow = 'hidden';
};

window.closeFullscreenPreview = function () {
document.getElementById('code-preview-modal').classList.remove('show');
document.body.style.overflow = '';
_splitActive = false;
document.getElementById('modal-code-panel').classList.add('collapsed');
document.getElementById('split-toggle-btn').innerHTML = '<i class="fa-solid fa-table-columns"></i> Split View';
};

window.toggleSplitView = function () {
_splitActive = !_splitActive;
const panel = document.getElementById('modal-code-panel');
const btn = document.getElementById('split-toggle-btn');
if (_splitActive) {
panel.classList.remove('collapsed');
panel.style.width = '45%';
btn.innerHTML = '<i class="fa-solid fa-square"></i> Preview Only';
} else {
panel.classList.add('collapsed');
btn.innerHTML = '<i class="fa-solid fa-table-columns"></i> Split View';
}
};

window.refreshModalPreview = function () {
const iframe = document.getElementById('modal-preview-iframe');
renderToIframe(iframe, _modalCode, _modalLang);
};

window.copyModalCode = function () {
navigator.clipboard.writeText(_modalCode).then(() => {
const btn = document.querySelector('.preview-modal-btn[onclick="copyModalCode()"]');
if (btn) {
btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-copy"></i> Salin Kode'; }, 2000);
}
});
};

window.startDrag = function (e) {
if (!_splitActive) return;
e.preventDefault();
const divider = document.getElementById('modal-divider');
const codePanel = document.getElementById('modal-code-panel');
const container = divider.parentElement;
divider.classList.add('dragging');
const onMove = (ev) => {
const containerRect = container.getBoundingClientRect();
const x = (ev.clientX || ev.touches?.[0].clientX) - containerRect.left;
const pct = Math.min(Math.max((x / containerRect.width) * 100, 20), 70);
codePanel.style.width = pct + '%';
};
const onUp = () => {
divider.classList.remove('dragging');
document.removeEventListener('mousemove', onMove);
document.removeEventListener('mouseup', onUp);
};
document.addEventListener('mousemove', onMove);
document.addEventListener('mouseup', onUp);
};

document.addEventListener('keydown', (e) => {
if (e.key === 'Escape') closeFullscreenPreview();
});

let _blockCounter = 0;
window.formatBotContent = function (text) {
return text.replace(/\n/g, '<br>').replace(/```(\w*)([\s\S]*?)```/g, (match, lang, code) => {
const language = lang.trim() || 'javascript';
const cleanCode = code.replace(/<br>/g, '\n').trim();
const escapedCode = cleanCode.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const safeCode = encodeURIComponent(cleanCode);
const langLower = language.toLowerCase();
const canPreview = ['html', 'htm', 'javascript', 'js', 'css'].includes(langLower)
|| cleanCode.includes('<html') || cleanCode.includes('<!DOCTYPE');
const blockId = 'codeblock-' + (++_blockCounter);
const previewTabHTML = canPreview ? `
<button class="tab-btn" data-tab="preview" onclick="switchTab('${blockId}', 'preview')">
<span class="tab-dot"></span> Preview
</button>` : '';
const previewPaneHTML = canPreview ? `
<div class="preview-pane">
<div class="preview-loading">
<div class="preview-spinner"></div>
<span>Merender preview...</span>
</div>
<iframe sandbox="allow-scripts allow-same-origin allow-forms allow-modals" style="width:100%;min-height:320px;border:none;display:block;"></iframe>
<div class="preview-status-bar">
<div class="status-dot"></div>
<span>Preview siap</span>
<button class="status-refresh-btn" onclick="refreshInlinePreview('${blockId}')">
<i class="fa-solid fa-rotate-right"></i> Refresh
</button>
</div>
</div>` : '';
const fullscreenBtnHTML = canPreview ? `
<button class="code-btn fullscreen-btn" onclick="openFullscreenPreview('${blockId}')" title="Buka Fullscreen">
<i class="fa-solid fa-expand"></i> Fullscreen
</button>` : '';
return `
<div class="code-block-wrapper" id="${blockId}" data-code="${safeCode}" data-lang="${langLower}">
<div class="code-tab-bar">
<span class="code-lang-badge">${language}</span>
<div class="tab-switcher">
<button class="tab-btn active" data-tab="code" onclick="switchTab('${blockId}', 'code')">
<span class="tab-dot"></span> Kode
</button>
${previewTabHTML}
</div>
<div class="code-actions-right">
${fullscreenBtnHTML}
<button class="code-btn" onclick="copyInlineCode(this, '${safeCode}')">
<i class="fa-solid fa-copy"></i> Salin
</button>
</div>
</div>
<div class="code-pane">
<pre><code class="language-${language}">${escapedCode}</code></pre>
</div>
${previewPaneHTML}
</div>`;
});
};

window.copyInlineCode = function (btn, safeCode) {
navigator.clipboard.writeText(decodeURIComponent(safeCode)).then(() => {
btn.classList.add('success');
btn.innerHTML = '<i class="fa-solid fa-check"></i> Tersalin!';
setTimeout(() => { btn.classList.remove('success'); btn.innerHTML = '<i class="fa-solid fa-copy"></i> Salin'; }, 2000);
});
};

async function sendMessage() {
const input = document.getElementById('user-input');
const txt = input.value.trim();
if (!txt && !currentImg64) return;
const welcome = document.getElementById('welcome-screen');
if (welcome) welcome.remove();
if (!allSessions[currentSessionId]) {
allSessions[currentSessionId] = { title: txt ? txt.substring(0, 25) + "..." : "Gambar...", timestamp: Date.now(), messages: [] };
} else if (allSessions[currentSessionId].messages?.length === 0) {
allSessions[currentSessionId].title = txt ? txt.substring(0, 25) + "..." : "Gambar...";
}
const imgToSend = currentImg64;
addBubble(txt, 'user', imgToSend, false, true);
const payload = { history: (allSessions[currentSessionId].messages || []).slice(-10), message: txt, image: imgToSend };
input.value = ""; clearImage();

// START THINKING TIMER
window.startThinkingTimer();

const loadingId = addBubble("", 'bot', null, true, false);
const botContainer = document.getElementById(loadingId);
try {
const res = await fetch('/api', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload)
});
if (!res.ok) throw new Error("Gagal terhubung.");
const reader = res.body.getReader();
const decoder = new TextDecoder("utf-8");
let fullText = "";
botContainer.innerHTML = `<div class="avatar"><i class="fa-solid fa-spa"></i></div><div class="bot-content" id="content-${loadingId}"></div>`;
const contentDiv = document.getElementById(`content-${loadingId}`);
let buffer = "";
while (true) {
const { done, value } = await reader.read();
if (done) break;
buffer += decoder.decode(value, { stream: true });
let lines = buffer.split('\n');
buffer = lines.pop();
for (const line of lines) {
if (line.trim() === "" || line.includes("[DONE]")) continue;
if (line.startsWith(" ")) {
try {
const data = JSON.parse(line.substring(6));
if (data.text) {
fullText += data.text;
contentDiv.innerHTML = window.formatBotContent(fullText);
document.getElementById('chat-stream').scrollTo({ top: document.getElementById('chat-stream').scrollHeight });
}
} catch (e) { }
}
}
}
// STOP THINKING TIMER
window.stopThinkingTimer();

if (window.Prism) Prism.highlightAllUnder(botContainer);
if (!allSessions[currentSessionId].messages) allSessions[currentSessionId].messages = [];
allSessions[currentSessionId].messages.push({ role: 'assistant', content: fullText, image: null });
saveSessions();
} catch (e) {
window.stopThinkingTimer();
botContainer.innerHTML = `<div class="avatar"><i class="fa-solid fa-spa"></i></div><div class="bot-content"><div style="color:#ef4444;padding:12px;">Error: ${e.message}</div></div>`;
}
}

async function sendDrawRequest(prompt) {
const input = document.getElementById('user-input');
const welcome = document.getElementById('welcome-screen');
if (welcome) welcome.remove();
if (!allSessions[currentSessionId]) { allSessions[currentSessionId] = { title: prompt, timestamp: Date.now(), messages: [] }; }
addBubble(`Gambarkan: ${prompt}`, 'user', null, false, true);
input.value = "";
const loadingId = addBubble("", 'bot', null, true, false);
try {
const res = await fetch('/api/draw', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt }) });
const data = await res.json();
if (!res.ok || !data.success) throw new Error(data.error || "Gagal membuat gambar.");
document.getElementById(loadingId).remove();
const images = data.images || (data.url ? [data.url] : []);
if (images.length > 0) { addBubble(`Berikut hasilnya untuk: ${prompt}`, 'bot', images, false, true); }
else { throw new Error("Tidak ada gambar yang dihasilkan."); }
} catch (e) { document.getElementById(loadingId).innerHTML = `<div style="color:#ef4444;padding:12px;">Gagal: ${e.message}</div>`; }
}

async function sendImageToEditor() {
const input = document.getElementById('user-input'); const txt = input.value.trim();
if (!txt) { alert("Tulis instruksi editnya!"); return; }
const welcome = document.getElementById('welcome-screen'); if (welcome) welcome.remove();
if (!allSessions[currentSessionId]) { allSessions[currentSessionId] = { title: "Edit Gambar", timestamp: Date.now(), messages: [] }; }
const imgToSend = currentImg64;
addBubble(`Edit: ${txt}`, 'user', imgToSend, false, true);
input.value = ""; clearImage();
const loadingId = addBubble("", 'bot', null, true, false);
try {
const resStart = await fetch('/api/edit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ step: 'start', image: imgToSend, prompt: txt }) });
const dataStart = await resStart.json();
if (!dataStart.success) throw new Error(dataStart.error || "Gagal memulai job.");
const jobId = dataStart.jobId; let attempts = 0;
const pollInterval = setInterval(async () => {
attempts++;
try {
const resCheck = await fetch('/api/edit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ step: 'check', jobId }) });
const dataCheck = await resCheck.json();
if (dataCheck.status === 'done') { clearInterval(pollInterval); document.getElementById(loadingId).remove(); addBubble(`Selesai! Hasil edit: ${txt}`, 'bot', dataCheck.url, false, true); }
else if (dataCheck.status === 'failed') { clearInterval(pollInterval); throw new Error("Gambar ditolak."); }
else if (attempts >= 20) { clearInterval(pollInterval); throw new Error("Waktu habis."); }
} catch (errLoop) { clearInterval(pollInterval); document.getElementById(loadingId).innerHTML = `<div style="color:#ef4444">Error: ${errLoop.message}</div>`; }
}, 3000);
} catch (e) { document.getElementById(loadingId).innerHTML = `<div style="color:#ef4444">Error: ${e.message}</div>`; }
}

function addBubble(text, role, img, isLoading, saveToMem) {
const container = document.getElementById('msg-container');
const div = document.createElement('div');
div.className = `msg-group ${role}`;
div.id = 'msg-' + Date.now();
if (saveToMem) {
if (!allSessions[currentSessionId].messages) allSessions[currentSessionId].messages = [];
allSessions[currentSessionId].messages.push({ role: role === 'user' ? 'user' : 'assistant', content: text, image: img });
saveSessions();
}
if (role === 'user') {
const imgHtml = img ? `<img src="${img}" style="max-width:180px;border-radius:10px;margin-bottom:8px;display:block;">` : '';
div.innerHTML = `<div class="bubble">${imgHtml}<div>${text.replace(/\n/g, '<br>')}</div></div>`;
} else {
if (isLoading) {
div.innerHTML = `<div class="avatar"><i class="fa-solid fa-spa"></i></div><div style="padding:10px 0;"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
} else {
let mediaHtml = '';
if (Array.isArray(img)) {
let gridItems = img.map(url => `<a href="${url}" target="_blank"><img src="${url}" loading="lazy" onerror="this.style.display='none'"></a>`).join('');
mediaHtml = `<div class="img-grid">${gridItems}</div>`;
} else if (img && typeof img === 'string') {
mediaHtml = `<div class="single-img"><a href="${img}" target="_blank"><img src="${img}" referrerpolicy="no-referrer"></a></div>`;
}
let formatted = window.formatBotContent(text);
div.innerHTML = `<div class="avatar"><i class="fa-solid fa-spa"></i></div><div class="bot-content">${mediaHtml}${formatted}</div>`;
}
}
container.appendChild(div);
if (window.Prism) Prism.highlightAll();
document.getElementById('chat-stream').scrollTo({ top: document.getElementById('chat-stream').scrollHeight, behavior: 'smooth' });
return div.id;
}

window.processInput = function () {
const input = document.getElementById('user-input');
const txt = input.value.trim();
if (!txt && !currentImg64) return;
updateInputDockPosition(false);
if (imgMode === 'edit') { if (currentImg64) { sendImageToEditor(); return; } else { sendDrawRequest(txt); return; } }
const drawRegex = /^(gambarkan|buatkan gambar|buat gambar|\/img|\/draw)\s+(.+)/i;
const match = txt.match(drawRegex);
if (match) { sendDrawRequest(match[2]); return; }
sendMessage();
};

window.activateDrawMode = function () { const input = document.getElementById('user-input'); input.value = "Gambarkan "; input.focus(); };
window.autoResize = function (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
window.setImgMode = function (mode) {
imgMode = mode;
document.querySelectorAll('.preview-mode-btn').forEach(btn => btn.classList.remove('active'));
document.getElementById(`mode-${mode}`).classList.add('active');
document.getElementById('user-input').placeholder = mode === 'edit' ? "Tulis gaya editnya..." : "Tanya sesuatu tentang gambar ini...";
};
window.handleFile = function (input) {
const file = input.files[0]; if (!file) return;
if (!file.type.startsWith('image/')) { alert("Harap pilih file gambar!"); return; }
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image(); img.src = e.target.result;
img.onload = () => {
const canvas = document.createElement('canvas'); let width = img.width; let height = img.height; const MAX_SIZE = 800;
if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
canvas.width = width; canvas.height = height;
const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
currentImg64 = canvas.toDataURL('image/jpeg', 0.7);
setImgMode('vision');
document.getElementById('preview-img-element').src = currentImg64;
document.getElementById('img-preview-box').classList.add('show');
};
};
reader.readAsDataURL(file);
};
window.clearImage = function () { currentImg64 = null; document.getElementById('file-input').value = ""; document.getElementById('img-preview-box').classList.remove('show'); };
window.toggleSidebar = function () { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('show'); };
window.addEventListener('resize', () => { const welcome = document.getElementById('welcome-screen'); updateInputDockPosition(!!welcome); });
document.addEventListener('DOMContentLoaded', () => {
const ta = document.getElementById('user-input');
if (ta) {
ta.addEventListener('keydown', (e) => {
if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processInput(); }
});
}
});
</script>
